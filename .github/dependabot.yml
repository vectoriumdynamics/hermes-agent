# Dependabot config for vectoriumdynamics/hermes-agent
# Lives at .github/dependabot.yml in the fork's main branch.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ----- Python (Hermes core + MCPs) -----
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    reviewers:
      - "vectoriumdynamics"
    commit-message:
      prefix: "deps(py)"
      include: "scope"
    # Group minor + patch bumps so we don't get 50 PRs
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # ----- npm (if any tooling uses Node) -----
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(js)"

  # ----- GitHub Actions versions (keep CI workflows current) -----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(ci)"
